<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F95D0A" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#F95D0A" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1">
    <line x1="120" y1="220" x2="1080" y2="220"/>
    <line x1="120" y1="360" x2="1080" y2="360"/>
    <line x1="120" y1="500" x2="1080" y2="500"/>
    <line x1="120" y1="640" x2="1080" y2="640"/>
  </g>

  <!-- Eyebrow -->
  <text x="120" y="120" fill="#F95D0A" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" letter-spacing="6">FREE WEBSITE TEARDOWN</text>

  <!-- Headline -->
  <text x="120" y="180" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="800" letter-spacing="-1">Is your site leaking revenue?</text>

  <!-- Area under curve -->
  <path d="M120,700 L200,690 L300,670 L400,650 L500,600 L600,540 L700,440 L800,360 L900,280 L1000,220 L1080,190 L1080,760 L120,760 Z" fill="url(#area)"/>

  <!-- Growth line -->
  <path d="M120,700 L200,690 L300,670 L400,650 L500,600 L600,540 L700,440 L800,360 L900,280 L1000,220 L1080,190"
        fill="none" stroke="#F95D0A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- End node -->
  <circle cx="1080" cy="190" r="12" fill="#F95D0A" filter="url(#glow)"/>

  <!-- Before / After markers -->
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="120" y="745" fill="#FFFFFF" fill-opacity="0.4" font-size="22" font-weight="700">BEFORE</text>
    <text x="1010" y="745" fill="#F95D0A" font-size="22" font-weight="700">AFTER</text>
  </g>

  <!-- Stat chips -->
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="120" y="792" width="270" height="78" rx="16" fill="#111111" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <text x="140" y="828" fill="#F95D0A" font-size="34" font-weight="800">400%</text>
    <text x="140" y="856" fill="#FFFFFF" fill-opacity="0.5" font-size="17" font-weight="600">ORGANIC GROWTH</text>

    <rect x="410" y="792" width="270" height="78" rx="16" fill="#111111" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <text x="430" y="828" fill="#F95D0A" font-size="34" font-weight="800">Top 3</text>
    <text x="430" y="856" fill="#FFFFFF" fill-opacity="0.5" font-size="17" font-weight="600">GOOGLE MAP PACK</text>

    <rect x="700" y="792" width="380" height="78" rx="16" fill="#111111" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <text x="720" y="828" fill="#FFFFFF" font-size="24" font-weight="800">launchatdawn<tspan fill="#F95D0A">.com</tspan></text>
    <text x="720" y="856" fill="#FFFFFF" fill-opacity="0.5" font-size="17" font-weight="600">MONTREAL // VANCOUVER</text>
  </g>
</svg>
